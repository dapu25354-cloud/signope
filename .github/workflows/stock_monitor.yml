name: Stock Monitor Cloud

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式：evening（收盤重點）或 intraday（獵殺與籌碼掃描）'
        default: 'intraday'
  schedule:
    # 每個交易日(週一~週五)自動重生網頁。cron 是 UTC，台灣時間 = UTC+8。
    - cron: '0 4 * * 1-5'   # UTC 04:00 = 台灣 12:00 盤中快照
    - cron: '0 8 * * 1-5'   # UTC 08:00 = 台灣 16:00 收盤後(法人籌碼已出)完整版
  push:
    branches: [main]
    paths: ['.github/workflows/stock_monitor.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stock Monitor
        # 排程(schedule)只更新網頁、不跑獵殺/通知，避免每天發 Telegram 轟炸。
        # 手動觸發(workflow_dispatch)或改 workflow 檔時才跑完整掃描與通知。
        if: github.event_name != 'schedule'
        run: |
          # 判斷目前時間決定模式 (如果不是手動觸發)
          HOUR=$(date +%H)
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$HOUR" -eq "12" ]; then
              RUN_MODE="evening"
            else
              RUN_MODE="intraday"
            fi
          else
            RUN_MODE="${{ github.event.inputs.mode }}"
          fi

          if [ "$RUN_MODE" = "intraday" ]; then
            echo "Mode: Intraday Hunter & Chip Scan"
            python cold_blooded_hunter.py
            python panic_bottom_hunter.py
            python cloud_notifier.py
          else
            echo "Mode: Evening Closing Report"
            python cloud_notifier.py evening
          fi

      - name: Generate static dashboard HTML
        run: |
          python holdings_radar.py
          python add_zone.py
          python web_scans.py

      - name: Commit and push updated dashboard HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html radar.html add_zone.html diamonds.html turning.html
          git diff-index --quiet HEAD || (git commit -m "Auto-update stock dashboard HTML" && git push)
